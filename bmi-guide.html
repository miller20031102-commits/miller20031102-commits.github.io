<h1>BMI 是什麼？</h1>

<p>BMI（Body Mass Index）又稱身體質量指數，是利用身高與體重評估身材是否健康的指標。</p>

<h2>BMI 計算公式</h2>

<p>BMI = 體重(kg) ÷ 身高(m)²</p>

<h2>台灣 BMI 標準</h2>

<ul>
<li>低於 18.5：過輕</li>
<li>18.5 - 24：正常</li>
<li>24 - 27：過重</li>
<li>27 以上：肥胖</li>
</ul>

<h2>BMI 的限制</h2>

<p>肌肉量較高的人可能 BMI 偏高，因此 BMI 僅作為健康參考指標之一。</p>
